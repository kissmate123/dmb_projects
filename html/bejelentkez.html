<!DOCTYPE html>
<html lang="hu">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BEJELENTKEZÉS</title>
  <link rel="icon" type="image/x-icon" href="../images/logo_favi.png">
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: url("images/doom_bg.jpg") no-repeat center center fixed;
      background-size: cover;
      color: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .tartalom {
      background: rgba(20, 20, 20, 0.95);
      border: 2px solid blueviolet;
      box-shadow: 0 0 20px blueviolet;
      border-radius: 12px;
      padding: 30px;
      width: 350px;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: blueviolet;
      text-shadow: 0 0 10px black;
    }

    label {
      display: block;
      text-align: left;
      margin: 10px 0 5px;
      font-weight: bold;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: none;
      border-radius: 6px;
      background: #2a2a2a;
      color: #f2f2f2;
      font-size: 14px;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: 2px solid blueviolet;
      background: #1c1c1c;
    }

    .button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      background: blueviolet;
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .button:hover {
      background: indigo;
      transform: scale(1.02);
    }

    .extra label {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    }
    .extra input[type="checkbox"] {
    accent-color: blueviolet; /* szép színes checkbox modern böngészőkben */
    }


    a {
      color: blueviolet;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    /* Tab szerkezet */
    .tab-buttons {
      display: flex;
      justify-content: space-around;
      margin-bottom: 20px;
    }

    .tab-buttons button {
      flex: 1;
      padding: 10px;
      background: #2a2a2a;
      border: none;
      color: #ddd;
      cursor: pointer;
      font-weight: bold;
      border-radius: 6px 6px 0 0;
      transition: 0.3s;
    }

    .tab-buttons button.active {
      background: blueviolet;
      color: white;
    }

    .form-content {
      display: none;
    }

    .form-content.active {
      display: block;
    }
    
  </style>
</head>

<body>
  <div class="tartalom">
    <div class="tab-buttons">
      <button class="active" onclick="showForm('login')">Bejelentkezés</button>
      <button onclick="showForm('register')">Regisztráció</button>
    </div>

    <!-- LOGIN -->
    <div id="login" class="form-content active">
      <h2>Bejelentkezés</h2>
      <form method="post" action="login.php">
        <label>Felhasználónév</label>
        <input type="text" name="Uname" placeholder="Felhasználónév">

        <label>Jelszó</label>
        <input type="password" name="pass" placeholder="Jelszó">

        <input class="button" type="submit" value="Bejelentkezés">

        <div class="extra">
        <label>
            Emlékezz rám
            <input type="checkbox" id="remember1">
            
        </label>
        </div>

        <div class="extra">
          <a href="#">Elfelejtette jelszavát?</a>
        </div>
      </form>
    </div>

    <!-- REGISTER -->
    <div id="register" class="form-content">
      <h2>Regisztráció</h2>
      <form method="post" action="register.php">
        <label>Felhasználónév</label>
        <input type="text" name="Uname" placeholder="Felhasználónév">

        <label>Jelszó</label>
        <input type="password" name="pass" placeholder="Jelszó">

        <input class="button" type="submit" value="Regisztráció">

        <div class="extra">
        
        </div>
      </form>
    </div>
  </div>

  <script>
    function showForm(id) {
      document.querySelectorAll(".form-content").forEach(f => f.classList.remove("active"));
      document.querySelectorAll(".tab-buttons button").forEach(b => b.classList.remove("active"));
      document.getElementById(id).classList.add("active");
      event.target.classList.add("active");
    }
  </script>
</body>

</html>
