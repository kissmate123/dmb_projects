<!DOCTYPE html>
<html lang="hu">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Karakterek</title>
  <link rel="icon" type="image/x-icon" href="../images/logo_favi.png">
  <style>
    body {
      margin: 0;
      font-family: "Impact", "Arial Black", sans-serif;
      background: url("images/doom_bg.jpg") no-repeat center center fixed;
      background-size: cover;
      color: #f2f2f2;
      padding-top: 70px;
    }

    /* NAVBAR */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: linear-gradient(180deg, #1a1a1a, #000);
      border-bottom: 2px solid #800000;
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.6);
      z-index: 1000;
      padding: 10px 0;
    }

    .nav-container {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.8rem;
      color: #ff0000;
      text-shadow: 0 0 10px #ff1a1a, 2px 2px 4px #000;
      text-decoration: none;
    }

    .nav-logo img {
      height: 32px;
      width: auto;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0;
    }

    .nav-links a {
      color: #f2f2f2;
      font-size: 1rem;
      text-decoration: none;
      transition: 0.3s;
      padding: 6px 12px;
      border-radius: 4px;
    }

    .nav-links a.active {
      color: #ff0000;
      font-weight: bold;
      border-bottom: 2px solid #ff0000;
      text-shadow: 0 0 15px #ff3333;
    }

    /* Tartalom */
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 20px auto;
      padding: 20px;
    }

    .karakter {
      text-align: center;
      font-size: 1.8rem;
      color: #ff0000;
      text-shadow: 0 0 15px #ff1a1a, 2px 2px 4px #000;
      animation: pulse 1.5s infinite alternate;
      background: rgba(20, 20, 20, 0.9);
      border: 2px solid #ff0000;
      box-shadow: inset 0 0 20px rgba(255, 0, 0, 0.6),
        0 0 15px rgba(0, 0, 0, 0.8);
      opacity: 0.95;
      border-radius: 10px;
      padding: 20px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .karakter:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px #ff0000;
    }

    .karakter img {
      width: 100%;
      height: auto;
      border-radius: 6px;
      margin-bottom: 15px;
    }

    /* Batman stílus */
    .batman {
      background: linear-gradient(180deg, #0d0d0d, #1a1a1a);
      border: 2px solid #f1c40f;
      /* sárga */
      color: #f1c40f;
      text-shadow: 0 0 12px #f1c40f, 2px 2px 4px #000;
      box-shadow: inset 0 0 25px rgba(241, 196, 15, 0.6),
        0 0 20px rgba(0, 0, 0, 0.9);
      animation: none;
      /* Batman ne villogjon */
    }

    .batman:hover {
      transform: none;
      box-shadow: 0 0 30px #f1c40f;
    }

    /* Scorpion stílus (Mortal Kombat) */
    .scorpion {
      background: linear-gradient(180deg, #1a1a1a, #000000);
      border: 2px solid #ffcc00;
      /* arany-sárga */
      color: #ffcc00;
      text-shadow: 0 0 15px #ff9900, 2px 2px 4px #000;
      box-shadow: inset 0 0 25px rgba(255, 153, 0, 0.6),
        0 0 25px rgba(255, 140, 0, 0.8);
      animation: flamePulse 1.8s infinite alternate;
    }

    .scorpion:hover {
      transform: scale(1.08);
      box-shadow: 0 0 40px #ff6600;
    }

    @keyframes pulse {
      from {
        text-shadow: 0 0 10px #ff1a1a, 2px 2px 4px #000;
      }

      to {
        text-shadow: 0 0 25px #ff4d4d, 4px 4px 8px #000;
      }
    }

    @keyframes flamePulse {
      from {
        text-shadow: 0 0 10px #ff6600, 2px 2px 4px #000;
      }

      to {
        text-shadow: 0 0 25px #ffaa00, 4px 4px 8px #000;
      }
    }

    .elvalaszto {
      width: 100%;
      height: 50px;
      background-color: black;
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
      color: #ff0000;
      text-shadow: 0 0 15px #ff1a1a, 2px 2px 4px #000;
      animation: pulse 1.5s infinite alternate;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }

    .elvalaszto h3 {
      margin: 0;
      font-size: 1.5rem;
    }

    .alapkarakter {
      text-align: center;
      font-size: 1.8rem;
      color: #ff0000;
      text-shadow: 0 0 15px #ff1a1a, 2px 2px 4px #000;
      animation: pulse 1.5s infinite alternate;
      background: rgba(20, 20, 20, 0.9);
      border: 2px solid #ff0000;
      box-shadow: inset 0 0 20px rgba(255, 0, 0, 0.6),
        0 0 15px rgba(0, 0, 0, 0.8);
      opacity: 0.95;
      border-radius: 10px;
      padding: 20px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .alapkarakter:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px #ff0000;
    }

    .alapkarakter img {
      width: 100%;
      height: auto;
      border-radius: 6px;
      margin-bottom: 15px;
    }
    #bejelent {
      background-color: blueviolet;
      color: #fff;
      padding: 8px 16px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
      cursor: default;
    }
    #bejelent:hover {
      background-color: indigo; 
      color: #fff;
    }
  </style>
</head>

<body>

  <nav class="navbar">

        The Pixel Realms

      <ul class="nav-links">

</body>
